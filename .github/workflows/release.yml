name: release

on:
  push:
    tags:
      - "v*"
    paths:
      - "src/**"
      - "tests/**"
      - "Project1/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PolyhydraGames.MonoGame.sln

      - name: Build
        run: dotnet build PolyhydraGames.MonoGame.sln -c Release --no-restore

      - name: Test
        run: dotnet test PolyhydraGames.MonoGame.sln -c Release --no-build

      - name: Publish MonoGame library
        run: dotnet publish src/PolyhydraGames.MonoGame.csproj -c Release -o artifacts/publish/MonoGame

      - name: Publish Project1 sample
        run: dotnet publish Project1/Project1.csproj -c Release -o artifacts/publish/Project1

      - name: Package build output
        run: |
          mkdir -p artifacts
          zip -r artifacts/MonoGame-build.zip artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monogame-build
          path: artifacts/MonoGame-build.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/MonoGame-build.zip
