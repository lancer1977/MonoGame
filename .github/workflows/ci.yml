name: ci

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "tests/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore PolyhydraGames.MonoGame.sln
      - name: Build
        run: dotnet build PolyhydraGames.MonoGame.sln -c Release --no-restore
      - name: Test
        run: dotnet test PolyhydraGames.MonoGame.sln -c Release --no-build
